
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{display:flex;height:680px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.sb{width:180px;flex-shrink:0;background:#1E293B;display:flex;flex-direction:column}
.sb-logo{padding:14px 16px;border-bottom:0.5px solid rgba(255,255,255,0.08)}
.sb-t{font-size:13px;font-weight:500;color:#fff}
.sb-s{font-size:11px;color:#475569;margin-top:2px}
.sb-nav{padding:8px;flex:1}
.nb{font-size:10px;color:#475569;padding:8px 8px 3px;letter-spacing:.06em}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;margin-bottom:1px;cursor:pointer}
.ni:hover{background:rgba(255,255,255,0.06)}
.ni.on{background:#2563EB}
.ni svg{width:14px;height:14px;flex-shrink:0}
.ni-l{font-size:12px;color:#94A3B8}
.ni.on .ni-l{color:#fff;font-weight:500}
.ni-b{margin-left:auto;font-size:10px;background:#EF4444;color:#fff;padding:1px 5px;border-radius:8px}
.sb-bot{padding:8px;border-top:0.5px solid rgba(255,255,255,0.08)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--color-background-primary)}
.topbar{height:46px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 14px;flex-shrink:0}
.tb-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.tb-r{margin-left:auto}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0;padding:0 14px}
.tab{font-size:12px;padding:9px 12px;color:var(--color-text-secondary);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.tab:hover{color:var(--color-text-primary)}
.tab.on{color:#2563EB;border-bottom-color:#2563EB;font-weight:500}
.body{flex:1;overflow:auto;padding:12px 14px}
.rec-card{border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;border:0.5px solid}
.rec-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.rec-title{font-size:12px;font-weight:500}
.rec-body{font-size:11px;line-height:1.55}
.rec-evidence{font-size:10px;margin-top:5px;padding:4px 8px;border-radius:4px;background:rgba(255,255,255,0.5)}
</style>

<div class="app">
  <div class="sb">
    <div class="sb-logo">
      <div class="sb-t">HR Analytics</div>
      <div class="sb-s">Attrition Prediction</div>
    </div>
    <div class="sb-nav">
      <div class="nb">MAIN</div>
      <div class="ni">
        <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="7" width="3" height="6" rx="1" fill="#94A3B8"/><rect x="5.5" y="4.5" width="3" height="8.5" rx="1" fill="#94A3B8"/><rect x="10" y="1.5" width="3" height="11" rx="1" fill="#94A3B8"/></svg>
        <span class="ni-l">Overview</span>
      </div>
      <div class="ni">
        <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="#94A3B8" stroke-width="1"/><line x1="1" y1="4.5" x2="13" y2="4.5" stroke="#94A3B8" stroke-width=".7"/><rect x="3" y="6.5" width="3" height="1" rx=".5" fill="#94A3B8"/><rect x="3" y="8.5" width="6" height="1" rx=".5" fill="#94A3B8"/></svg>
        <span class="ni-l">Employee Risk</span>
        <span class="ni-b">287</span>
      </div>
      <div class="ni">
        <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#94A3B8" stroke-width="1"/><path d="M7 4.5V7.5L9 9" stroke="#94A3B8" stroke-width="1" stroke-linecap="round"/></svg>
        <span class="ni-l">Prediction</span>
      </div>
      <div class="nb">INSIGHTS</div>
      <div class="ni on">
        <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="#fff" stroke-width="1"/><path d="M2.5 12.5c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="#fff" stroke-width="1" stroke-linecap="round"/></svg>
        <span class="ni-l">HR Insights</span>
      </div>
    </div>
    <div class="sb-bot">
      <div class="ni">
        <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="#64748B" stroke-width="1"/><path d="M2.5 12.5c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="#64748B" stroke-width="1" stroke-linecap="round"/></svg>
        <span class="ni-l">สมชาย (HR)</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="tb-title">HR Insights</div>
      <div class="tb-r">
        <button style="font-size:11px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer">Download PDF</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab" onclick="">SHAP Summary</div>
      <div class="tab on">Recommendations</div>
      <div class="tab" onclick="">What-If Analysis</div>
      <div class="tab" onclick="">Executive Summary</div>
    </div>
    <div class="body" id="body"></div>
  </div>
</div>

<script>
const recs=[
  {priority:'เร่งด่วน',title:'ลด / จำกัด OverTime',color:'#791F1F',bg:'#FCEBEB',border:'#F7C1C1',
   body:'OT เป็นปัจจัยที่ส่งผลมากที่สุด (SHAP Value 88%) พนักงานที่ทำ OT ลาออก 22.8% vs ไม่ทำ OT 11.7% มีพนักงานทำ OT อยู่ 1,500 คน',
   action:'จำกัด OT ไม่เกิน 10 ชั่วโมง/สัปดาห์ หรือให้ค่าตอบแทน OT เพิ่ม 1.5 เท่า',
   impact:'กลุ่มเป้าหมาย 1,500 คน ลด Risk Score ลงได้อย่างมีนัยสำคัญ',target:'1,500 คน'},
  {priority:'เร่งด่วน',title:'ปรับเงินเดือนกลุ่ม < 3,000',color:'#791F1F',bg:'#FCEBEB',border:'#F7C1C1',
   body:'กลุ่ม OT + เงินเดือน < 3,000 มีอัตราลาออก 51.9% สูงที่สุดใน Dataset MonthlyIncome เป็น Feature สำคัญอันดับ 2 ใน SHAP (72%)',
   action:'ทบทวน Salary Benchmark กับตลาด และปรับเงินเดือนให้ไม่ต่ำกว่า 5,000',
   impact:'133 คนในกลุ่มนี้ ลด Risk Score จาก 51.9% เหลือ ~15%',target:'133 คน'},
  {priority:'กลาง',title:'วาง Career Path ที่ชัดเจน',color:'#412402',bg:'#FAEEDA',border:'#FAC775',
   body:'พนักงานที่ไม่ได้รับการเลื่อนตำแหน่งนาน 6-7 ปีมีอัตราลาออก 19-20% YearsSinceLastPromotion มีผลต่อ SHAP อย่างมีนัยสำคัญ',
   action:'สร้าง IDP ทบทวนการเลื่อนตำแหน่งทุก 2 ปี และ Job Rotation ทุก 3-5 ปี',
   impact:'65 คนในกลุ่มนี้ ลด Attrition จาก 19% เหลือ ~13%',target:'65 คน'},
  {priority:'กลาง',title:'เพิ่ม Stock Option กลุ่ม Level 1-2',color:'#412402',bg:'#FAEEDA',border:'#FAC775',
   body:'StockOptionLevel = 0 ลาออก 20% vs มี Stock Option 15-16% SHAP ระบุว่า Stock Option ช่วยลด Risk Score ได้จริง (-40%)',
   action:'ให้ Stock Option Level 1 กับพนักงาน Level 1-2 ที่ Performance ดี',
   impact:'~800 คน ลด Attrition ได้ ~4-5%',target:'~800 คน'},
  {priority:'ระยะยาว',title:'เพิ่มความถี่ Training',color:'#173404',bg:'#EAF3DE',border:'#C0DD97',
   body:'Training 5 ครั้ง/ปีลาออกแค่ 12.9% vs ไม่ได้ Training เลย 15.4% มาจาก Feature TrainingTimesLastYear ใน Dataset',
   action:'วาง Training Calendar ให้ครบทุกคนอย่างน้อย 4-5 ครั้ง เน้น Job-relevant Skills',
   impact:'ลด Attrition ได้ ~2.5% สำหรับพนักงานทั้งหมด',target:'ทุกพนักงาน'},
  {priority:'ระยะยาว',title:'โปรแกรม Onboarding พนักงานใหม่',color:'#173404',bg:'#EAF3DE',border:'#C0DD97',
   body:'กลุ่ม YearsAtCompany ≤ 1 มีอัตราลาออกสูงสุดใน Dataset พนักงานที่อยู่พ้น 5 ปีแรกมีแนวโน้มอยู่ต่อนานขึ้น',
   action:'สร้าง Onboarding Program 6 เดือน มี Buddy System และ Check-in ทุก 3 เดือน',
   impact:'กลุ่ม YearsAtCompany ≤ 1 ลด Attrition จาก ~18% เหลือ ~12%',target:'พนักงานใหม่'},
];

const body=document.getElementById('body');
body.innerHTML=`<div style="margin-bottom:10px;font-size:11px;color:var(--color-text-secondary)">HR Recommendations 6 ข้อ — เรียงตามความเร่งด่วน มี Data Evidence รองรับทุกข้อ</div>`+
recs.map(r=>`
<div class="rec-card" style="background:${r.bg};border-color:${r.border}">
  <div class="rec-top">
    <div class="rec-title" style="color:${r.color}">${r.title}</div>
    <div style="display:flex;gap:6px">
      <span style="font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,0.5);color:${r.color}">${r.priority}</span>
      <span style="font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,0.5);color:${r.color}">${r.target}</span>
    </div>
  </div>
  <div class="rec-body" style="color:${r.color};opacity:0.9">${r.body}</div>
  <div class="rec-evidence" style="color:${r.color}">
    <span style="font-weight:500">Action:</span> ${r.action}<br>
    <span style="font-weight:500">ผลที่คาดหวัง:</span> ${r.impact}
  </div>
</div>`).join('');
</script>
