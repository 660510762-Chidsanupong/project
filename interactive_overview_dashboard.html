<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  .app {
    display: flex;
    height: 700px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    background: var(--color-background-tertiary)
  }

  .sb {
    width: 180px;
    flex-shrink: 0;
    background: #1E293B;
    display: flex;
    flex-direction: column
  }

  .sb-logo {
    padding: 14px 16px;
    border-bottom: 0.5px solid rgba(255, 255, 255, 0.08)
  }

  .sb-t {
    font-size: 13px;
    font-weight: 500;
    color: #fff
  }

  .sb-s {
    font-size: 11px;
    color: #475569;
    margin-top: 2px
  }

  .sb-nav {
    padding: 10px 8px;
    flex: 1
  }

  .nb {
    font-size: 10px;
    color: #475569;
    padding: 8px 8px 3px;
    letter-spacing: .06em
  }

  .ni {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    margin-bottom: 1px;
    cursor: pointer;
    transition: background .15s
  }

  .ni:hover {
    background: rgba(255, 255, 255, 0.06)
  }

  .ni.on {
    background: #2563EB
  }

  .ni-l {
    font-size: 12px;
    color: #94A3B8
  }

  .ni.on .ni-l {
    color: #fff;
    font-weight: 500
  }

  .ni-b {
    margin-left: auto;
    font-size: 10px;
    background: #EF4444;
    color: #fff;
    padding: 1px 5px;
    border-radius: 8px
  }

  .sb-bot {
    padding: 8px;
    border-top: 0.5px solid rgba(255, 255, 255, 0.08)
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--color-background-primary)
  }

  .topbar {
    height: 46px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0
  }

  .tb-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary)
  }

  .tb-badge {
    font-size: 10px;
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    padding: 2px 7px;
    border-radius: 10px;
    border: 0.5px solid var(--color-border-tertiary)
  }

  .tb-r {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center
  }

  .sel {
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 6px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary)
  }

  .btn-e {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    background: #2563EB;
    color: #fff;
    border: none;
    cursor: pointer
  }

  .tabs {
    display: flex;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    flex-shrink: 0;
    padding: 0 14px
  }

  .tab {
    font-size: 12px;
    padding: 9px 12px;
    color: var(--color-text-secondary);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all .15s;
    user-select: none
  }

  .tab:hover {
    color: var(--color-text-primary)
  }

  .tab.on {
    color: #2563EB;
    border-bottom-color: #2563EB;
    font-weight: 500
  }

  .body {
    flex: 1;
    overflow: auto;
    padding: 12px 14px
  }

  .kpis {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px
  }

  .kpi {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 12px
  }

  .kpi-l {
    font-size: 10px;
    color: var(--color-text-secondary);
    margin-bottom: 3px
  }

  .kpi-v {
    font-size: 20px;
    font-weight: 500
  }

  .kpi-s {
    font-size: 10px;
    margin-top: 2px
  }

  .r {
    color: #A32D2D
  }

  .w {
    color: #633806
  }

  .g {
    color: #27500A
  }

  .b {
    color: #185FA5
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 12px
  }

  .card-t {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 8px
  }

  .bar-r {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px
  }

  .bar-lb {
    font-size: 10px;
    color: var(--color-text-secondary);
    width: 80px;
    flex-shrink: 0;
    text-align: right
  }

  .bar-tr {
    flex: 1;
    height: 7px;
    background: var(--color-background-secondary);
    border-radius: 3px;
    overflow: hidden
  }

  .bar-f {
    height: 100%;
    border-radius: 3px;
    transition: width .4s
  }

  .bar-vl {
    font-size: 10px;
    width: 32px;
    text-align: right
  }

  .tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    table-layout: fixed
  }

  .tbl th {
    text-align: left;
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 500;
    color: var(--color-text-secondary);
    border-bottom: 0.5px solid var(--color-border-tertiary)
  }

  .tbl td {
    padding: 6px 8px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 500
  }

  .bh {
    background: #FCEBEB;
    color: #791F1F
  }

  .bm {
    background: #FAEEDA;
    color: #412402
  }

  .bl {
    background: #EAF3DE;
    color: #173404
  }

  .risk-bar {
    display: flex;
    align-items: center;
    gap: 5px
  }

  .risk-tr {
    flex: 1;
    height: 5px;
    background: var(--color-background-secondary);
    border-radius: 3px;
    overflow: hidden
  }

  .risk-f {
    height: 100%;
    border-radius: 3px
  }

  .group-card {
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 12px;
    margin-bottom: 8px
  }

  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px
  }

  .group-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-primary)
  }

  .group-count {
    font-size: 11px;
    color: var(--color-text-secondary)
  }

  .group-bar-wrap {
    height: 8px;
    background: var(--color-background-secondary);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px
  }

  .group-bar {
    height: 100%;
    border-radius: 4px
  }

  .group-items {
    display: flex;
    gap: 6px;
    flex-wrap: wrap
  }

  .group-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px
  }

  .trend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary)
  }

  .trend-month {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-primary);
    width: 60px;
    flex-shrink: 0
  }

  .trend-bar-wrap {
    flex: 1;
    height: 10px;
    background: var(--color-background-primary);
    border-radius: 4px;
    overflow: hidden;
    border: 0.5px solid var(--color-border-tertiary)
  }

  .trend-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .5s
  }

  .trend-val {
    font-size: 11px;
    font-weight: 500;
    width: 36px;
    text-align: right
  }

  .trend-delta {
    font-size: 10px;
    width: 40px;
    text-align: right
  }

  .alert-box {
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 0.5px solid
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  let currentTab = 0;

  const tabs = document.querySelectorAll('.tab');
  function switchTab(i) {
    currentTab = i;
    tabs.forEach((t, idx) => t.classList.toggle('on', idx === i));
    render();
  }

  function kpis() {
    return `<div class="kpis">
    <div class="kpi"><div class="kpi-l">Attrition Rate</div><div class="kpi-v r">14.76%</div><div class="kpi-s r">↑ 1.2% จากเดือนก่อน</div></div>
    <div class="kpi"><div class="kpi-l">High Risk</div><div class="kpi-v w">287 คน</div><div class="kpi-s" style="color:var(--color-text-secondary)">Risk Score > 70%</div></div>
    <div class="kpi"><div class="kpi-l">ลาออกแล้ว</div><div class="kpi-v" style="color:var(--color-text-primary)">1,476 คน</div><div class="kpi-s" style="color:var(--color-text-secondary)">จาก 10,000</div></div>
    <div class="kpi"><div class="kpi-l">OT + เงินเดือน &lt;3K</div><div class="kpi-v r">133 คน</div><div class="kpi-s r">เสี่ยงสูงสุด 51.9%</div></div>
  </div>`;
  }

  function tab0() {
    return kpis() + `
  <div class="row2">
    <div class="card">
      <div class="card-t">Attrition Rate แยก Job Role</div>
      ${[['Sales Rep', 79, '#A32D2D', '23.5%'], ['HR', 68, '#A32D2D', '20.4%'], ['Lab Tech', 63, '#633806', '18.8%'], ['Research Sci', 56, '#633806', '16.8%'], ['Sales Exec', 53, '#633806', '15.9%'], ['Manager', 40, '#27500A', '12.1%'], ['Mfg Director', 37, '#27500A', '11.1%']].map(([l, p, c, v]) => `
      <div class="bar-r">
        <div class="bar-lb">${l}</div>
        <div class="bar-tr"><div class="bar-f" style="width:${p}%;background:${c}"></div></div>
        <div class="bar-vl" style="color:${c}">${v}</div>
      </div>`).join('')}
      <div style="margin-top:6px;font-size:10px;color:var(--color-text-secondary)">เส้นประ = baseline 14.76%</div>
    </div>
    <div class="card">
      <div class="card-t">Top 5 พนักงานเสี่ยงสูง</div>
      <table class="tbl">
        <thead><tr><th style="width:32%">ชื่อ</th><th style="width:22%">แผนก</th><th style="width:28%">Risk Score</th><th style="width:18%">ระดับ</th></tr></thead>
        <tbody>
          ${[['พนักงาน A', 'Sales', 91, '#A32D2D', 'bh'], ['พนักงาน B', 'R&D', 84, '#A32D2D', 'bh'], ['พนักงาน C', 'HR', 79, '#A32D2D', 'bh'], ['พนักงาน D', 'R&D', 65, '#633806', 'bm'], ['พนักงาน E', 'Sales', 61, '#633806', 'bm']].map(([n, d, s, c, b]) => `
          <tr>
            <td style="font-weight:500">${n}</td><td>${d}</td>
            <td><div class="risk-bar"><div class="risk-tr"><div class="risk-f" style="width:${s}%;background:${c}"></div></div><span style="font-size:10px;font-weight:500;color:${c};min-width:24px">${s}%</span></div></td>
            <td><span class="badge ${b}">${b === 'bh' ? 'High' : 'Medium'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="card-t">Attrition Rate แยก Department × OverTime</div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:4px">
      ${[['Sales', '12%', '24%'], ['R&D', '10.6%', '22.2%'], ['HR', '12.7%', '22.2%']].map(([dept, no, ot]) => `
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:6px">${dept}</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <div style="text-align:center">
            <div style="width:28px;height:44px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:3px;display:flex;align-items:flex-end;overflow:hidden;margin:0 auto">
              <div style="width:100%;height:${parseFloat(no) / 30 * 100}%;background:#27500A"></div>
            </div>
            <div style="font-size:9px;color:var(--color-text-secondary);margin-top:2px">ไม่ OT</div>
            <div style="font-size:10px;font-weight:500;color:#27500A">${no}</div>
          </div>
          <div style="text-align:center">
            <div style="width:28px;height:44px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:3px;display:flex;align-items:flex-end;overflow:hidden;margin:0 auto">
              <div style="width:100%;height:${parseFloat(ot) / 30 * 100}%;background:#A32D2D"></div>
            </div>
            <div style="font-size:9px;color:var(--color-text-secondary);margin-top:2px">OT</div>
            <div style="font-size:10px;font-weight:500;color:#A32D2D">${ot}</div>
          </div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
  }

  function tab1() {
    const groups = [
      { title: 'OT + เงินเดือน < 3,000', count: 133, pct: 51.9, color: '#A32D2D', bg: '#FCEBEB', border: '#F7C1C1', tags: ['Sales Rep 48 คน', 'Lab Tech 35 คน', 'Research Sci 28 คน', 'HR 22 คน'], action: 'เร่งด่วน — ทบทวนเงินเดือนและนโยบาย OT ทันที' },
      { title: 'อายุ ≤ 25 ปี + ทำ OT', count: 89, pct: 31.2, color: '#633806', bg: '#FAEEDA', border: '#FAC775', tags: ['Sales Rep 32 คน', 'Lab Tech 27 คน', 'Research Sci 18 คน', 'HR 12 คน'], action: 'เร่งด่วน — Career Path และ Mentoring สำหรับกลุ่มเริ่มต้น' },
      { title: 'ไม่ได้โปรโมท 6-7 ปี', count: 65, pct: 19.5, color: '#633806', bg: '#FAEEDA', border: '#FAC775', tags: ['Manager 18 คน', 'Sales Exec 21 คน', 'Research Sci 15 คน', 'Lab Tech 11 คน'], action: 'กลาง — ทบทวน IDP และ Promotion Cycle' },
      { title: 'Single + OT + Level 1', count: 42, pct: 31.4, color: '#A32D2D', bg: '#FCEBEB', border: '#F7C1C1', tags: ['Sales Rep 19 คน', 'Lab Tech 14 คน', 'Research Sci 9 คน'], action: 'เร่งด่วน — กลุ่มเสี่ยงสูงสุด Combo 3 ปัจจัย' },
    ];
    return kpis() + `
  <div style="margin-bottom:10px;font-size:11px;color:var(--color-text-secondary)">พนักงานกลุ่มเสี่ยงสูง 287 คน แบ่งตามปัจจัยหลัก — เรียงจากเร่งด่วนมากสุด</div>
  ${groups.map(g => `
  <div class="group-card" style="background:${g.bg};border-color:${g.border}">
    <div class="group-header">
      <div class="group-title" style="color:${g.color}">${g.title}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:${g.color};font-weight:500">${g.pct}% เสี่ยงลาออก</span>
        <span class="badge bh" style="background:${g.border};color:${g.color}">${g.count} คน</span>
      </div>
    </div>
    <div class="group-bar-wrap"><div class="group-bar" style="width:${g.pct / 60 * 100}%;background:${g.color}"></div></div>
    <div class="group-items" style="margin-bottom:8px">
      ${g.tags.map(t => `<span class="group-tag" style="background:rgba(255,255,255,0.6);color:${g.color};border:0.5px solid ${g.border}">${t}</span>`).join('')}
    </div>
    <div style="font-size:11px;color:${g.color};padding:6px 10px;background:rgba(255,255,255,0.5);border-radius:4px">
      HR Action: ${g.action}
    </div>
  </div>`).join('')}`;
  }

  function tab2() {
    return `<div style="padding:1rem 0;">
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem;">
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center;">
        <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;">พนักงานทั้งหมด</div>
        <div style="font-size:28px;font-weight:500;color:var(--color-text-primary);">28</div>
        <div style="font-size:12px;color:var(--color-text-tertiary);">คน</div>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center;">
        <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;">รวม records เข้างาน</div>
        <div style="font-size:28px;font-weight:500;color:var(--color-text-primary);">6,634</div>
        <div style="font-size:12px;color:var(--color-text-tertiary);">วัน</div>
      </div>

  function initCharts() {
    const isDk = matchMedia('(prefers-color-scheme:dark)').matches;
    const tc = isDk ? '#ccc' : '#555';
    const gc = isDk ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';

    new Chart(document.getElementById('deptChart'),{type:'doughnut',data:{labels:['Development (11)','Management (8)','Outsource (8)','Executive (1)'],datasets:[{data:[11,8,8,1],backgroundColor:['#534AB7','#1D9E75','#888780','#D85A30'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});

    new Chart(document.getElementById('jobChart'),{type:'bar',data:{labels:['System Analyst','Senior Prog.','Intern Prog.','Junior Prog.','Tester','Others'],datasets:[{data:[4,3,3,2,2,4],backgroundColor:'#534AB7',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}}});

    var months=['2023-05','2023-08','2023-11','2024-02','2024-05','2024-08','2024-11','2025-02','2025-05','2025-08','2025-11','2026-02','2026-05'];
    var attendData=[145,158,157,132,139,126,138,139,219,246,260,293,83];
    new Chart(document.getElementById('attendChart'),{type:'line',data:{labels:months,datasets:[{label:'records',data:attendData,borderColor:'#534AB7',backgroundColor:'rgba(83,74,183,0.1)',fill:true,tension:0.4,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc,maxRotation:45}},y:{grid:{color:gc},ticks:{color:tc}}}}});

    new Chart(document.getElementById('leaveChart'),{type:'bar',data:{labels:['ID-2','ID-10','ID-11','ID-1','ID-8'],datasets:[{data:[18,16,15,12,11],backgroundColor:['#E24B4A','#E24B4A','#E24B4A','#BA7517','#BA7517'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc}}}}});

    new Chart(document.getElementById('otChart'),{type:'bar',data:{labels:['ID-22','ID-14','ID-25','ID-8','ID-26'],datasets:[{data:[9,6,6,3,2],backgroundColor:['#D85A30','#D85A30','#D85A30','#BA7517','#BA7517'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc}}}}});

    var empIDs=['ID-18','ID-19','ID-2','ID-1','ID-16','ID-10','ID-12','ID-17','ID-11','ID-8','ID-22','ID-6','ID-14','ID-28'];
    var empHours=[7.88,7.33,7.75,7.60,7.40,6.94,7.61,8.26,8.18,7.55,7.88,6.69,7.65,8.07];
    var hc=empHours.map(function(h){return h>=8.0?'#E24B4A':h>=7.7?'#BA7517':'#1D9E75';});
    new Chart(document.getElementById('hoursChart'),{type:'bar',data:{labels:empIDs,datasets:[{data:empHours,backgroundColor:hc,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11},maxRotation:45,autoSkip:false}},y:{grid:{color:gc},ticks:{color:tc},min:6,max:9,title:{display:true,text:'ชม./วัน',color:tc}}}}});

    var riskIDs=['ID-11','ID-8','ID-22','ID-14','ID-2','ID-1','ID-10'];
    var riskScores=[90,85,80,65,60,50,45];
    var rc=riskScores.map(function(s){return s>=80?'#E24B4A':s>=60?'#BA7517':'#1D9E75';});
    new Chart(document.getElementById('riskChart'),{type:'bar',data:{labels:riskIDs,datasets:[{label:'Risk Score',data:riskScores,backgroundColor:rc,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc},min:0,max:100,title:{display:true,text:'คะแนน (0-100)',color:tc}}}}});
  }

  function render() {
    const body = document.getElementById('body');
    if (currentTab === 0) body.innerHTML = tab0();
    else if (currentTab === 1) body.innerHTML = tab1();
    else if (currentTab === 2) { body.innerHTML = tab2(); initCharts(); }
